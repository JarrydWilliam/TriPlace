workflows:
  # ── iOS Native Build ─────────────────────────────────────────────────────────
  ios-release:
    name: SameVibe iOS Release
    max_build_duration: 60
    environment:
      node: 20.11.0
      xcode: latest
      cocoapods: default
      groups:
        - samevibe_env        # VITE_FIREBASE_* + OPENAI_API_KEY + DATABASE_URL
      vars:
        BUNDLE_ID: com.samevibe.app
        XCODE_WORKSPACE: ios/App/App.xcworkspace
        XCODE_SCHEME: App
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install Node dependencies
        script: |
          npm install

      - name: Build web bundle
        script: |
          npm run build

      - name: Add iOS platform (if missing)
        script: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi

      - name: Sync Capacitor to iOS
        script: |
          npx cap sync ios

      - name: Set up keychain and code signing
        script: |
          set -e # Fail if any command fails
          keychain initialize
          
          echo "Fetching signing files for $BUNDLE_ID..."
          # We add set +e so we can capture the exact exit code and error if it fails
          set +e
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create --verbose
          FETCH_STATUS=$?
          set -e
          
          if [ $FETCH_STATUS -ne 0 ]; then
            echo "❌ ERROR: Failed to fetch or create provisioning profile."
            echo "Codemagic cannot automatically create the profile without App Store Connect API credentials."
            echo "Please ensure you have configured the Apple Developer Portal integration in Codemagic UI and referenced it, OR manually create the App ID 'com.samevibe.app' in the Apple Developer Portal."
            exit 1
          fi
          
          keychain add-certificates
          xcode-project use-profiles
          
          echo "Checking downloaded profiles:"
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/ || echo "No profiles directory found!"

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --config Release

      - name: Upload to TestFlight
        script: |
          app-store-connect publish \
            --path build/ios/ipa/*.ipa \
            --whats-new "SameVibe beta – initial build"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

  # ── Android Native Build ──────────────────────────────────────────────────────
  android-release:
    name: SameVibe Android Release
    max_build_duration: 60
    environment:
      node: 20.11.0
      java: 17
      groups:
        - samevibe_env
        - samevibe_android_keystore
      vars:
        PACKAGE_NAME: com.samevibe.app
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install Node dependencies
        script: npm install

      - name: Build web bundle
        script: npm run build

      - name: Add Android platform (if missing)
        script: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor to Android
        script: npx cap sync android

      - name: Set up keystore
        script: |
          echo "$KEYSTORE_BASE64" | base64 -d > keystore.jks

      - name: Build Android App Bundle
        script: |
          cd android
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file="$CM_BUILD_DIR/keystore.jks" \
            -Pandroid.injected.signing.store.password="$STORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

      - name: Upload to Google Play
        script: |
          google-play publish \
            --package-name "$PACKAGE_NAME" \
            --track internal \
            --artifact-type aab \
            android/app/build/outputs/bundle/release/app-release.aab

    artifacts:
      - android/app/build/outputs/bundle/release/app-release.aab
      - android/app/build/outputs/apk/release/app-release.apk
