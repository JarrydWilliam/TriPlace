workflows:
  # ── iOS Native Build ─────────────────────────────────────────────────────────
  ios-release:
    name: SameVibe iOS Release
    max_build_duration: 60
    
    # 🔑 This line links the API Key you added in Codemagic to this build!
    integrations:
      app_store_connect: Codemagic
      
    environment:
      node: 20.11.0
      xcode: latest
      cocoapods: default
      groups:
        - samevibe_env        # VITE_FIREBASE_* + OPENAI_API_KEY + DATABASE_URL
      vars:
        BUNDLE_ID: com.samevibe.app
        XCODE_WORKSPACE: ios/App/App.xcworkspace
        XCODE_SCHEME: App
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install Node dependencies
        script: |
          npm install

      - name: Build web bundle
        script: |
          npm run build

      - name: Add iOS platform (if missing)
        script: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi

      - name: Sync Capacitor to iOS
        script: |
          npx cap sync ios

      - name: Set up keychain and code signing
        script: |
          # Fail immediately if any command fails
          set -e
          
          keychain initialize
          
          echo "Fetching and creating signing files for $BUNDLE_ID..."
          
          # Temporarily disable exit on error to capture the exact exit code
          set +e
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --verbose
          FETCH_STATUS=$?
          set -e
          
          if [ $FETCH_STATUS -ne 0 ]; then
            echo "❌ ERROR: Failed to fetch or create provisioning profile."
            echo "The API key integration named 'Codemagic' was likely not found or lacks permissions."
            exit 1
          fi
          
          keychain add-certificates
          xcode-project use-profiles
          
          echo "Code signing setup successful. Downloaded profiles:"
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --config Release

      - name: Upload to TestFlight
        script: |
          app-store-connect publish \
            --path build/ios/ipa/*.ipa \
            --whats-new "SameVibe beta – initial build"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

  # ── Android Native Build ──────────────────────────────────────────────────────
  android-release:
    name: SameVibe Android Release
    max_build_duration: 60
    environment:
      node: 20.11.0
      java: 17
      groups:
        - samevibe_env
        - samevibe_android_keystore
      vars:
        PACKAGE_NAME: com.samevibe.app
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install Node dependencies
        script: npm install

      - name: Build web bundle
        script: npm run build

      - name: Add Android platform (if missing)
        script: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor to Android
        script: npx cap sync android

      - name: Set up keystore
        script: |
          echo "$KEYSTORE_BASE64" | base64 -d > keystore.jks

      - name: Build Android App Bundle
        script: |
          cd android
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file="$CM_BUILD_DIR/keystore.jks" \
            -Pandroid.injected.signing.store.password="$STORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

      - name: Upload to Google Play
        script: |
          google-play publish \
            --package-name "$PACKAGE_NAME" \
            --track internal \
            --artifact-type aab \
            android/app/build/outputs/bundle/release/app-release.aab

    artifacts:
      - android/app/build/outputs/bundle/release/app-release.aab
      - android/app/build/outputs/apk/release/app-release.apk
